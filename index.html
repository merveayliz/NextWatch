<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextWatch | Keşfetmeye Başla</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <h1 id="main-logo" class="logo-center">NextWatch</h1>

    <div id="site-wrapper" class="hidden-content">
    <header>
    <nav class="navbar">
        <div class="nav-links">
            <a href="#" onclick="showFavorites()">Favoriler</a>
            <a href="#" class="profile-link">
                <span>Profil</span>
                <i class="fas fa-user-circle"></i>
            </a>
        </div>
    </nav>
    <hr class="nav-divider">
</header>
<br><br>
        <main id="main-content">
            <div class="hero-section">
                <div class="hero-text">
                    <h2 id="p">Keşfetmeye Hazır mısın?</h2>
                    
                    <div class="filter-container">
                        <div class="filter-group">
                            <button class="filter-btn active" onclick="setMainFilter('all', this)">Hepsi</button>
                            <button class="filter-btn" onclick="setMainFilter('Film', this)">Filmler</button>
                            <button class="filter-btn" onclick="setMainFilter('Dizi', this)">Diziler</button>
                        </div>

                        <div class="filter-group secondary">
                            <select id="genre-select" onchange="filterByGenre(this.value)">
                                <option value="all">Tüm Kategoriler</option>
                                <option value="Aksiyon">Aksiyon</option>
                                <option value="Bilim Kurgu">Bilim Kurgu</option>
                                <option value="Dram">Dram</option>
                                <option value="Macera">Macera</option>
                                <option value="Romantik">Romantik</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="movie-grid" class="movie-grid">
                </div>
        </main>
    </div>


    <div id="movie-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-body">
            <div class="modal-header-info">
                <img id="modal-img" src="" alt="">
                <div class="modal-text">
                    <h2 id="modal-title"></h2>
                    <p id="modal-meta"></p>
                    <p id="modal-desc"></p>
                </div>
            </div>
            <hr>
            <div class="comment-section">
                <h3><i class="fas fa-comments"></i> Yorumlar</h3>
                <div class="comment-input-area">
                    <input type="text" placeholder="Yorumunu yaz..." id="user-comment">
                    <button onclick="addComment()">Gönder</button>
                </div>
                <div id="comments-list">
                    </div>
            </div>
        </div>
    </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content auth-content">
        <span class="close-modal" onclick="closeAuthModal()">&times;</span>
        <div id="auth-forms">
            <h2 id="auth-title">Giriş Yap</h2>
            <div class="auth-input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı">
                <input type="password" id="password" placeholder="Şifre">
                <button onclick="handleAuth()" id="auth-submit">Giriş Yap</button>
            </div>
            <p id="auth-toggle">Hesabın yok mu? <a href="#" onclick="toggleAuthMode()">Kayıt Ol</a></p>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
